# SSI cash instruction lifecycle + Payment service — ZITADEL identity seed
#
# Roles    — functional permissions checked by OPA (what you CAN do)
# Groups   — organisational membership checked by OPA (what you BELONG TO)
#   MIDDLE_OFFICE          — active middle-office analyst/approver
#   UP_TO_100_MILLION_CLUB — may create/approve payments up to $100 M
#   UP_TO_1_BILLION_CLUB   — may create/approve payments up to $1 B
#   UP_TO_100_BILLION_CLUB — may create/approve payments up to $100 B
#   ADMIN                 — platform operator; required for secured admin UIs
# covering_lobs — LOBs the user is assigned to cover for payment approval

defaults:
  password: "Password1!"
  email_domain: ssi.local

users:

  # ═══════════════════════════════════════════════════════════════════════════
