  #                    → LOB-coverage violation if asked to approve FX payment
  #   pay-203          Dual-role analyst covering FX (100M limit)
  #                    → self-approval violation demo
  #   pay-204          Senior approver covering all three desks (100B limit)
  #   pay-205          Dual-role VP covering FICC (1B limit)
  #                    → self-approval violation demo
  #   pay-300          Senior MD covering FICC + FX + DESK_RATES (100B limit)
  #                    → 100B boundary demo (creates + approves if different user)
  #   pay-400          Partner — highest authority, covers all desks (100B limit)
  #                    → escalation / final-authority approver
  # ═══════════════════════════════════════════════════════════════════════════

