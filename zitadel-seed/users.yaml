  #                      requires MIDDLE_OFFICE group + matching covering_lobs
  #
  # Demo scenario coverage:
  #   pay-101/102/103  Middle-office creators — CREATE_PAYMENT requires covering_lobs
  #   pay-201          Approver covering FICC + FX (1B limit)
