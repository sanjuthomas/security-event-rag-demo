name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python lint ────────────────────────────────────────────────────────────
  lint:
    name: Lint — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - instruction-service
          - authorization-service
          - sequence-service
          - ssi-chat
          - ssi-indexer
          - ssi-demo-harness

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install --quiet ruff

      - name: Lint
        working-directory: ${{ matrix.service }}
        run: ruff check src/ --select E,F,W,I --ignore E501

  # ── Unit test coverage (≥70%, excludes test harness) ───────────────────────
  test-coverage:
    name: Coverage — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: instruction-service
            package: inst
            extra: dev
          - service: payment-service
            package: ps
            extra: dev
          - service: authorization-service
            package: authz
            extra: dev
          - service: sequence-service
            package: seq
            extra: dev
          - service: ssi-indexer
            package: etl
            extra: dev
          - service: ssi-chat
            package: chat_application
            extra: regression

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install shared packages
        run: |
          pip install --quiet \
            ./shared/telemetry \
            ./shared/platform_auth \
            ./shared/sequence_client \
            ./shared/authz_client \
            ./shared/cypher_gen

      - name: Install and run tests with coverage
        working-directory: ${{ matrix.service }}
        run: |
          pip install --quiet -e ".[${{ matrix.extra }}]"
          pytest --cov=${{ matrix.package }} --cov-report=term-missing --cov-fail-under=70

  # ── Docker build ───────────────────────────────────────────────────────────
  docker-build:
    name: Docker build — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: instruction-service
            context: .
            dockerfile: instruction-service/Dockerfile
          - service: authorization-service
            context: .
            dockerfile: authorization-service/Dockerfile
          - service: sequence-service
            context: .
            dockerfile: sequence-service/Dockerfile
          - service: ssi-chat
            context: .
            dockerfile: ssi-chat/Dockerfile
          - service: ssi-indexer
            context: .
            dockerfile: ssi-indexer/Dockerfile
          - service: ssi-demo-harness
            context: .
            dockerfile: ssi-demo-harness/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          tags: ${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
