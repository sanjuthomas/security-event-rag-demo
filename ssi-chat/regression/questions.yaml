# PolicyPilot regression question bank.
#
# retrieval — primary engine expected to produce the answer:
#   deterministic  Neo4j planned query + formatter (skips LLM synthesis)
#   graph          Neo4j planned or LLM Cypher is authoritative (vector runs but de-prioritized)
#   vector         Qdrant dense/BM25 hits are primary for open-ended event-log questions
#   eligibility    Live OPA via authorization-service (no case in this bank yet)
#
# Note: PolicyPilot still invokes dense vector search in parallel for all cases except eligibility.

version: 1
seed:
  steps:
  - action: run-policy-scenario
  - action: run-payment-policy-scenario
  - action: create-instructions
    count: 5
  - action: submit-instructions
    count: 5
  - action: approve-instructions
    count: 3
  - action: create-payments
    count: 4
  - action: submit-payments
    count: 4
  - action: approve-payments
    count: 2
  - action: reject-payments
    count: 1
  wait:
    min_security_events: 10
    min_qdrant_points: 15
    timeout_seconds: 300
    poll_interval_seconds: 4
cases:
- id: events_alerts_today
  mode: events
  retrieval: graph
  tags:
  - counts
  - alerts
  - today
  question: How many ALERT events happened today?
  expect:
    answer_has_number: true
    min_answer_length: 5
- id: events_instruction_denials_week
  mode: events
  retrieval: graph
