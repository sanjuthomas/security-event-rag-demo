- id: events_top_denial_user_week
  mode: events
  retrieval: deterministic
  tags:
  - ranking
  - alerts
  question: Which user triggered the most policy denial alerts this week?
  expect:
    min_answer_length: 10
    answer_contains_any:
    - alert
    - denial
